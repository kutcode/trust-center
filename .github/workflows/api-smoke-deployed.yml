name: API Smoke (Deployed)

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "Target API base URL (e.g. https://demo.trustcenter.dev)"
        required: false
        type: string
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    name: Run deployed API smoke suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve target URL
        id: target
        shell: bash
        run: |
          input_url='${{ github.event.inputs.api_url }}'
          var_url='${{ vars.SMOKE_API_URL }}'
          secret_url='${{ secrets.SMOKE_API_URL }}'

          target=""
          if [[ -n "$input_url" ]]; then
            target="$input_url"
          elif [[ -n "$var_url" ]]; then
            target="$var_url"
          elif [[ -n "$secret_url" ]]; then
            target="$secret_url"
          fi

          if [[ -z "$target" ]]; then
            if [[ "${{ github.event_name }}" == "schedule" ]]; then
              echo "::notice::No target URL configured. Skipping scheduled smoke run."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::No target URL configured."
            echo "::error::Provide workflow input 'api_url' or set repo variable/secret SMOKE_API_URL."
            exit 1
          fi

          echo "Using API URL: $target"
          echo "url=$target" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Skip notice
        if: steps.target.outputs.skip == 'true'
        run: echo "Scheduled smoke run skipped due to missing SMOKE_API_URL."

      - name: Run Hurl smoke suite
        if: steps.target.outputs.skip != 'true'
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            ghcr.io/orange-opensource/hurl:latest \
            --test \
            --variable "api_url=${{ steps.target.outputs.url }}" \
            /work/scripts/smoke-api.hurl
          smoke_exit_code=$?
          set -e

          if [[ $smoke_exit_code -ne 0 ]]; then
            if [[ "${{ vars.SMOKE_STRICT }}" == "true" ]]; then
              echo "::error::Smoke test failed and SMOKE_STRICT=true."
              exit $smoke_exit_code
            fi

            echo "::warning::Smoke test failed, but SMOKE_STRICT is not true. Marking run successful to reduce alert noise."
          fi
